name: Java CI/CD with Gradle

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'corretto'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build -x test

    - name: Copy JAR to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_KEY }}
        source: "build/libs/*.jar"
        target: "/home/ec2-user"
        strip_components: 2

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          sudo fuser -k 8080/tcp || true
          
          # 환경변수를 실행 시점에 직접 주입하여 배포
          nohup java -jar \
            -Dspring.profiles.active=prod \
            -DDB_URL_PROD="${{ secrets.DB_URL_PROD }}" \
            -DDB_USERNAME_PROD="${{ secrets.DB_USERNAME_PROD }}" \
            -DDB_PASSWORD_PROD="${{ secrets.DB_PASSWORD_PROD }}" \
            -DJWT_SECRET="${{ secrets.JWT_SECRET }}" \
            -DSOLAPI_API_KEY="${{ secrets.SOLAPI_API_KEY }}" \
            -DSOLAPI_API_SECRET="${{ secrets.SOLAPI_API_SECRET }}" \
            -DSOLAPI_SENDER_NUMBER_N="${{ secrets.SOLAPI_SENDER_NUMBER_N }}" \
            -DSOLAPI_SENDER_NUMBER_HIGHEND="${{ secrets.SOLAPI_SENDER_NUMBER_HIGHEND }}" \
            -DAWS_REGION="${{ secrets.AWS_REGION }}" \
            -DAWS_S3_BUCKET="${{ secrets.AWS_S3_BUCKET }}" \
            -DAWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY }}" \
            -DAWS_SECRET_KEY="${{ secrets.AWS_SECRET_KEY }}" \
            /home/ec2-user/*.jar > /home/ec2-user/app.log 2>&1 &