solapi:
  api-key: ${SOLAPI_API_KEY}
  api-secret: ${SOLAPI_API_SECRET}
  # SmsService 2인자(send to,text) 기본 발신번호 — 지점 분기 없을 때 하이엔드 번호
  sender-number: ${SOLAPI_SENDER_NUMBER_HIGHEND}
  sender:
    number:
      n: ${SOLAPI_SENDER_NUMBER_N}
      highend: ${SOLAPI_SENDER_NUMBER_HIGHEND}

# AWS S3 (실제 키·버킷은 프로필별 yml 또는 환경 변수로 주입)
cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY:}
      secret-key: ${AWS_SECRET_KEY:}
    region:
      static: ${AWS_REGION:ap-northeast-2}
    s3:
      bucket: ${AWS_S3_BUCKET:}

app:
  jwt:
    secret: ${JWT_SECRET:roadmap-admin-jwt-secret-key-min-256bits-for-hs256-algorithm}
    expiration-ms: ${JWT_EXPIRATION_MS:3153600000000}  # 100년 (사실상 무제한)

spring:
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  application:
    name: backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  jpa:
    properties:
      hibernate:
        format_sql: true
        globally_quoted_identifiers: true